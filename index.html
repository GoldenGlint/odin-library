<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <div class="header">
            <h1 class="header-text">The Library</h1>
        </div>
        
        <div class="shelf">
            <div class="button-container">
                <button class="add" command="show-modal" commandfor="dialog">+ Add Book</button>
                <dialog id="dialog" popover>
                    <p>This dialog was opened using a popovertargetaction attribute.</p>
                    <button commandfor="dialog" command="close">Close</button>
                </dialog>
            </div>
            <div class="books">
                
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
