<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <div class="header">
            <h1 class="header-text">The Library</h1>
        </div>
        
        <div class="shelf">
            <div class="button-container">
                <button class="add">+ Add Book</button>
            </div>
            <div class="books">
                <div class="book-card">
                    <div>
                        <p class="book-title">The Great Gatsby</p>
                        <p class="book-author">F. Scott Fitzgerald</p>
                    </div>
                    <hr class="book-divider">
                    <p class="book-meta">Pages: <span>180</span></p>
                    <span class="read-badge read">Read</span>
                    <button class="remove-btn">Remove</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
